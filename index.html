<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="taskbar">
        <div class="taskbar-icons">
            <div class="taskbar-icon" id="start-button">
                <img src="./Icons/door.svg" alt="Start">
            </div>
            <div class="taskbar-icon">
                <img src="./Icons/folder.svg" alt="Files">
            </div>
            <div class="taskbar-icon">
                <img src="./Icons/browser.svg" alt="Browser">
            </div>
            <div class="taskbar-icon">
                <img src="./Icons/Chat.svg" alt="Chat">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
