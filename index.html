<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop-icons">
        <div class="desktop-icon">
            <img src="./Icons/trash.svg" alt="Trash">
            <span>Trash</span>
        </div>
        <div class="desktop-icon">
            <img src="./Icons/text.svg" alt="Text File">
            <span>Notes.txt</span>
        </div>
        <div class="desktop-icon">
            <img src="./Icons/text.svg" alt="Text File">
            <span>Todo.txt</span>
        </div>
        <div class="desktop-icon">
            <img src="./Icons/image.svg" alt="Image File">
            <span>Vacation.jpg</span>
        </div>
        <div class="desktop-icon">
            <img src="./Icons/image.svg" alt="Image File">
            <span>Logo.png</span>
        </div>
        <div class="desktop-icon">
            <img src="./Icons/image.svg" alt="Image File">
            <span>Design.png</span>
        </div>
    </div>
    <div class="taskbar">
        <div class="taskbar-icons">
            <div class="taskbar-icon" id="start-button">
                <img src="./Icons/door.svg" alt="Start">
            </div>
            <div class="taskbar-icon">
                <img src="./Icons/folder.svg" alt="Files">
            </div>
            <div class="taskbar-icon">
                <img src="./Icons/browser.svg" alt="Browser">
            </div>
            <div class="taskbar-icon">
                <img src="./Icons/Chat.svg" alt="Chat">
            </div>
            <div class="taskbar-icon">
                <img src="./Icons/code.svg" alt="Code">
            </div>
        </div>
        <div class="taskbar-right">
            <div class="system-tray">
                <img src="./Icons/up-arrow.svg" alt="More" class="tray-icon small-icon">
                <img src="./Icons/wifi.svg" alt="Network" class="tray-icon">
                <img src="./Icons/sound.svg" alt="Volume" class="tray-icon">
            </div>
            <div class="datetime">
                <div id="time">10:00 AM</div>
                <div id="date">6/29/2026</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
